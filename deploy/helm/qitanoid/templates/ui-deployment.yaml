{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qitanoid.uiServiceName" . }}
  labels:
    {{- include "qitanoid.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "qitanoid.name" . }}-ui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "qitanoid.name" . }}-ui
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/ui-runtime: {{ include (print $.Template.BasePath "/ui-configmap-runtime.yaml") . | sha256sum }}
        checksum/ui-nginx: {{ include (print $.Template.BasePath "/ui-configmap-nginx.yaml") . | sha256sum }}
    spec:
      initContainers:
        - name: init-config
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - cp /config-src/config.js /html/config.js && chmod 644 /html/config.js && echo "Config copied:" && cat /html/config.js
          volumeMounts:
            - name: ui-runtime
              mountPath: /config-src
            - name: html-writable
              mountPath: /html
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          env:
            - name: QITANOID_UI_API_BASE_URL
              value: {{ .Values.ui.runtimeConfig.apiBaseUrl | quote }}
            - name: QITANOID_UI_WS_BASE_URL
              value: {{ .Values.ui.runtimeConfig.wsBaseUrl | quote }}
            - name: QITANOID_UI_ADMIN_TOKEN
              value: {{ .Values.ui.runtimeConfig.adminToken | quote }}
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          volumeMounts:
            - name: html-writable
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
            - name: ui-nginx
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: ui-runtime
          configMap:
            name: {{ include "qitanoid.uiServiceName" . }}-runtime
        - name: ui-nginx
          configMap:
            name: {{ include "qitanoid.uiServiceName" . }}-nginx
        - name: html-writable
          emptyDir: {}
      {{- with .Values.ui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "qitanoid.fullname" . }}
  labels:
    {{- include "qitanoid.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "qitanoid.fullname" . }}
  labels:
    {{- include "qitanoid.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "qitanoid.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "qitanoid.fullname" . }}
{{- end }}

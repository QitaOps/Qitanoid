{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "qitanoid.fullname" . }}-test-connection"
  labels:
    {{- include "qitanoid.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ["wget"]
      args: ["-qO-", "{{ include "qitanoid.hubServiceName" . }}:{{ .Values.service.port }}/healthz"]
  restartPolicy: Never
{{- end }}
---
{{- if and .Values.tests.enabled .Values.ui.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "qitanoid.uiServiceName" . }}-test-connection"
  labels:
    {{- include "qitanoid.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ["wget"]
      args: ["-qO-", "{{ include "qitanoid.uiServiceName" . }}:{{ .Values.ui.service.port }}/"]
  restartPolicy: Never
{{- end }}

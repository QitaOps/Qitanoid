nameOverride: ""
fullnameOverride: ""

image:
  repository: aidevtech/qitanoid-hub
  tag: 1.0.0
  pullPolicy: IfNotPresent

ui:
  enabled: true
  replicaCount: 1
  image:
    repository: "aidevtech/qitanoid-dashboard"
    tag: "1.0.0"
    pullPolicy: Always
  runtimeConfig:
    apiBaseUrl: same-origin
    wsBaseUrl: same-origin
    adminToken: ""
  service:
    type: ClusterIP
    port: 80
    nodePort: null
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

hub:
  replicaCount: 1
  orchestrator: kubernetes
  adminToken: ""
  allowedOrigins: "*"
  dashboardUrl: http://localhost:3000
  bakedRuntime: false
  browserMemory: 4Gi
  browserCPUs: "2"
  browserSHMSize: 2Gi
  sessionIdleTimeout: 30m
  extraEnv: []
  redis:
    addr: ""
    password: ""
    db: 0
    prefix: qitanoid
    connectTimeout: 30s
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

service:
  type: ClusterIP
  port: 4444
  nodePort: null

ingress:
  enabled: false
  className: nginx
  annotations: {}
  host: qitanoid.local
  path: /
  tls: []

persistence:
  enabled: false
  accessMode: ReadWriteOnce
  size: 20Gi
  storageClassName: ""

video:
  storage:
    type: filesystem
    s3:
      endpoint: ""
      bucket: ""
      prefix: videos
      useSSL: true
      autoCreateBucket: false
      deleteLocalAfterUpload: true
      accessKey: ""
      secretKey: ""
      existingSecret: ""

session:
  serviceAccount:
    create: true
    name: ""
  imagePullSecrets: []
  runtimeScripts:
    create: true
    existingConfigMap: ""
  nodeSelector: ""
  kvmNodeSelector: ""
  podLabels: ""
  podAnnotations: ""
  terminationGraceSeconds: 10
  podStartTimeout: 2m

config:
  file: ""
  rawJson: ""

redis:
  enabled: false
  image:
    repository: redis
    tag: "7.4-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

rbac:
  create: true

serviceAccount:
  create: true
  name: ""

podAnnotations: {}
podLabels: {}

tests:
  enabled: true
